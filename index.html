<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FF Nürnberg Stadt – Freiwillige Feuerwehr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --primary: #1e5f8e;
            --primary-dark: #164e73;
            --border: #e2e8f0;
            --header-bg: #ffffff;
            --badge-bg: #eef2ff;
            --badge-text: #1e40af;
            --btn-bg: #1e5f8e;
            --btn-hover: #164e73;
        }

        body.dark {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --border: #334155;
            --header-bg: #1e293b;
            --badge-bg: #1e3a8a;
            --badge-text: #bfdbfe;
            --btn-bg: #3b82f6;
            --btn-hover: #2563eb;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .site-header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }

        .logo p {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .toolbar {
            display: flex;
            gap: 0.75rem;
        }

        .tool-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
            transition: 0.1s;
        }
        .tool-btn:hover {
            background: var(--primary);
            color: white;
        }

        .burger {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text);
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.1s;
            color: var(--text);
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary);
            color: white;
        }

        @media (max-width: 768px) {
            .burger {
                display: block;
            }
            .nav-links {
                display: none;
                flex-direction: column;
                width: 100%;
                background: var(--card-bg);
                border-radius: 16px;
                padding: 1rem;
                margin-top: 0.5rem;
            }
            .nav-links.show {
                display: flex;
            }
        }

        .hero {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 3rem 2rem;
            border-radius: 24px;
            margin: 2rem 0;
            text-align: center;
            background-size: cover;
            background-position: center;
        }

        .hero h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .section-header {
            font-size: 1.6rem;
            margin: 1.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.1s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-img {
            width: 100%;
            height: 160px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .funk-badge {
            font-size: 0.7rem;
            background: var(--badge-bg);
            color: var(--badge-text);
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin: 0.3rem 0;
        }

        .defect-badge {
            background: #dc2626;
            color: white;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
            margin-left: 0.5rem;
        }

        .retired-badge {
            background: #6b7280;
            color: white;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
            margin-left: 0.5rem;
        }

        .service-period {
            font-size: 0.7rem;
            color: var(--text-light);
            margin: 0.3rem 0;
        }

        .detail-page {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2rem;
            margin: 1rem 0;
        }

        .detail-header {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .detail-img {
            width: 100%;
            max-height: 300px;
            overflow: hidden;
            border-radius: 16px;
            margin: 1rem 0;
        }

        .detail-img img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .detail-description {
            margin: 1rem 0;
        }

        .meta-row {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 0.5rem 0;
        }

        .inline-badge {
            display: inline-block;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-weight: normal;
        }

        button {
            background: var(--btn-bg);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            background: var(--btn-hover);
        }

        .report-btn {
            background: var(--primary);
            margin-bottom: 1rem;
        }

        .back-btn {
            background: var(--text-light);
            margin-bottom: 1rem;
        }

        .footer {
            text-align: center;
            padding: 1.5rem 0;
            margin-top: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            margin: 0 0.5rem;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            max-width: 500px;
            width: 90%;
            border-radius: 24px;
            padding: 1.5rem;
        }

        .collapsible {
            background: var(--primary-dark);
            color: white;
            cursor: pointer;
            padding: 1rem;
            width: 100%;
            border: none;
            text-align: left;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 40px;
            margin: 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .collapsible:hover {
            background: var(--primary);
        }
        .collapsible-content {
            display: none;
            overflow: hidden;
        }
        .collapsible-content.show {
            display: block;
        }
    </style>
</head>

    <div class="site-header">
        <div class="container">
            <div class="header-inner">

                    <h1>🚒 FF Nürnberg Stadt</h1>

    <div class="container">

    <script>

        const IMG_PATH = "images/";
        const PLACEHOLDER = IMG_PATH + "platzhalter.png";
        function getImageSrc(src) { return src ? IMG_PATH + src : PLACEHOLDER; }

        // --------------------------------------------------------------
        // FAHRZEUGDATEN
        // --------------------------------------------------------------
        let vehiclesActive = [
            { id: "a1", name: "KdoW", funk: "Florian Nürnberg 2/10-1", baujahr: "2026", besatzung: "1/4", text: "BF Caddy · Digitalfunk, Laptop, Lagekarte", image: "kdow.png", details: "Führungsfahrzeug für kleinere und mittlere Lagen. Ausgestattet mit Digitalfunk, Laptop mit Lagekarte und Einsatzführungssoftware." },
            { id: "a2", name: "HLF 16/25 (alt)", funk: "Florian Nürnberg 2/40-1", baujahr: "2001", besatzung: "1/8", text: "Gebraucht von der BF · 1.600 l/min, 2.500 l Wasser", image: "hlf.png", details: "Motorprobleme, Ersatz geplant. TÜV läuft November 2026 aus. Keine TS an Bord. Zieht FwA-Umwelt, Gulasch, Boot, NEA. Ausstattung: Plasmabrenner, 6 kVA Stromerzeuger, 6 Atemschutzgeräte, 2x CSA 3, 4x CSA 1. LED-Heckwarnanlage mit vier Blitzern, Frontblitzer neben Kühlergrill.", defect: true },
            { id: "a3", name: "GW-L1 (defekt)", funk: "Florian Nürnberg 2/55-1", baujahr: "2012", besatzung: "1/5", text: "Schnuckis Werkstatt · defekt (Dieselverbrauch)", image: "gwl1.png", details: "Notfall-Zugfahrzeug (nur City). Extrem hoher Dieselverbrauch. Wird 2026 ersetzt. Rollcontainer: RC Rettungsplattform, RC Verpflegung, RC Kühlschrank, RC Drohne, RC Heizung, RC Schnelleinsatzzelt. LED-Blaulichter, Heckwarnanlage mit runden Blitzern.", defect: true },

            { id: "a7", name: "FwA-Umwelt", text: "TS 16/8 BMW-Boxer", image: "tsa.png", category: "trailer", details: "TS 16/8 mit BMW Boxermotor (35 kW / 46 PS), 1.600 l/min bei 8 bar. Ölsperren, Bindemittel, Tauchpumpen. Zugfahrzeug: HLF 16/25." },
            { id: "a8", name: "FwA-Gulasch", text: "250 Portionen, Feuerbetrieb", image: "gulasch.png", category: "trailer", details: "Feuerbetrieb (Holz). 250 Portionen. Küchenwerkzeug, keine Tische/Stühle. Offroad mit GW-L1, sonst HLF 16/25." },
            { id: "a9", name: "FwA-NEA 250", text: "250 kVA Notstrom", image: "nea.png", category: "trailer", details: "LED-Lichtmast, Scania-Motor. Nur HLF 16/25 als Zugfahrzeug." },
            { id: "a10", name: "Bootsanhänger", text: "Bootsname Helmut, Funk 2/99-1", image: "boot.png", category: "trailer", details: "Schlauchboot mit 4 Plätzen. Funkrufname Boot: Florian Nürnberg 2/99-1. Zugfahrzeug: MTW, KdoW, GW-L1 (Notfall)." },
            { id: "a11", name: "Melde-Motorrad", funk: "Florian Nürnberg 2/17-1", baujahr: "unbekannt", besatzung: "1/1", text: "Western Police Bike, Traditionsfahrzeug", image: "motorrad.png", details: "Amerikanisches Polizeimotorrad, traditionelles Blaulicht, reines Melde- und Erkundungsfahrzeug. Seltene Sonderfahrten." }
        ];

        let vehiclesRetired = [
            { id: "r1", name: "LF 16 TS (LSHD)", funk: "kein Funkrufname (historisch)", baujahr: "ca. 1965", image: "lf16ts.png", details: "Erstes eigenes Löschfahrzeug (vorher nur Reserveeinheit bei der BF).", serviceFrom: "ca. 1965", serviceUntil: "ca. 1970" },
            { id: "r2", name: "LF 15 (Magirus-Deutz)", funk: "kein Funkrufname (historisch)", baujahr: "1950", image: "lf15.png", details: "Von einer befreundeten Ortswehr übernommen (Standort nicht mehr existent).", serviceFrom: "ca. 1970", serviceUntil: "1985" },
            { id: "r3", name: "VW Golf", funk: "kein Funkrufname (Dienstfahrzeug)", baujahr: "1985", image: "vwgolf.png", details: "Dienstfahrzeug für Transport- und Führungsaufgaben.", serviceFrom: "1985", serviceUntil: "2000" },
            { id: "r4", name: "VW T4 (altes MTW)", funk: "Florian Nürnberg 2/14-1 (früher)", baujahr: "2000", image: "vwt4.png", details: "Eigenausbau zum MTW. Nach Unfall 2017 außer Dienst.", serviceFrom: "2000", serviceUntil: "2017" }
        ];

        // Fachgruppen
        const specialGroups = [
            { name: "Luftunterstützung / Drohne", description: "Einsatz von Drohnen zur Lageerkundung, Wärmebild und Messflügen. Fahrzeug: GW Drohne." },
            { name: "Umwelt & Gefahrgut", description: "Zuständig für Umwelteinsätze, Öl-/Chemieunfälle, Messtechnik. Fahrzeuge: GW Drohne, FwA-Umwelt." },
            { name: "Verpflegung", description: "Einsatzverpflegung bei Großeinsätzen. Fahrzeug: FwA-Gulasch (TFK 250)." },
            { name: "Wasserrettung", description: "Unterstützung der Berufsfeuerwehr. Boot 'Helmut' (2/99-1). Zugfahrzeuge: MTW, KdoW." },
            { name: "Katastrophenschutz", description: "Fahrzeuge für den Katastrophenschutz: GW Drohne, LF 20 KatS." }
        ];

        // Partner (beliebig erweiterbar)
        const partners = [
            { name: "BEFT Modding Team", image: "beft.png", description: "Design für Einsatzfahrzeuge & Fahrzeugbereitstellung", link: "https://discord.gg/beft" },
            { name: "Bergung Wolf", image: "bergung-wolf.png", description: "Unterstützung auf dem Server Nürnberg RP", link: "https://discord.gg/bergungwolf" }
        ];

        let reports = [];
        let currentPage = "home";
        let currentDetailId = null;
        let currentDetailIsRetired = false;
        let isReading = false;
        let currentUtterance = null;

        // --------------------------------------------------------------
        // SPEICHER / LADEN
        // --------------------------------------------------------------
        function saveData() {
            localStorage.setItem("ff_reports", JSON.stringify(reports));
        }
        function loadData() {
            const r = localStorage.getItem("ff_reports");
            if (r) reports = JSON.parse(r);
            else reports = [];
        }
        loadData();

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, (m) => (m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;"));
        }

        // --------------------------------------------------------------
        // SEITEN PERSISTENZ
        // --------------------------------------------------------------
        function saveCurrentState() {
            const state = { page: currentPage, detailId: currentDetailId, detailIsRetired: currentDetailIsRetired };
            localStorage.setItem("ff_state", JSON.stringify(state));
        }

        function restoreState() {
            const state = localStorage.getItem("ff_state");
            if (state) {
                try
