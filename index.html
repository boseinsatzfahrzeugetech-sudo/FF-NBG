<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FF Nürnberg Stadt – Freiwillige Feuerwehr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --primary: #1e5f8e;
            --primary-dark: #164e73;
            --border: #e2e8f0;
            --header-bg: #ffffff;
            --badge-bg: #eef2ff;
            --badge-text: #1e40af;
            --btn-bg: #1e5f8e;
            --btn-hover: #164e73;
        }

        body.dark {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --border: #334155;
            --header-bg: #1e293b;
            --badge-bg: #1e3a8a;
            --badge-text: #bfdbfe;
            --btn-bg: #3b82f6;
            --btn-hover: #2563eb;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .site-header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }

        .logo p {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .toolbar {
            display: flex;
            gap: 0.75rem;
        }

        .tool-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
            transition: 0.1s;
        }
        .tool-btn:hover {
            background: var(--primary);
            color: white;
        }

        .burger {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text);
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.1s;
            color: var(--text);
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary);
            color: white;
        }

        @media (max-width: 768px) {
            .burger {
                display: block;
            }
            .nav-links {
                display: none;
                flex-direction: column;
                width: 100%;
                background: var(--card-bg);
                border-radius: 16px;
                padding: 1rem;
                margin-top: 0.5rem;
            }
            .nav-links.show {
                display: flex;
            }
        }

        .hero {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 3rem 2rem;
            border-radius: 24px;
            margin: 2rem 0;
            text-align: center;
            background-size: cover;
            background-position: center;
        }

        .hero h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .section-header {
            font-size: 1.6rem;
            margin: 1.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.1s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-img {
            width: 100%;
            height: 160px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .funk-badge {
            font-size: 0.7rem;
            background: var(--badge-bg);
            color: var(--badge-text);
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin: 0.3rem 0;
        }

        .defect-badge {
            background: #dc2626;
            color: white;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
            margin-left: 0.5rem;
        }

        .retired-badge {
            background: #6b7280;
            color: white;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
            margin-left: 0.5rem;
        }

        .service-period {
            font-size: 0.7rem;
            color: var(--text-light);
            margin: 0.3rem 0;
        }

        .detail-page {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2rem;
            margin: 1rem 0;
        }

        .detail-header {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .detail-img {
            width: 100%;
            max-height: 300px;
            overflow: hidden;
            border-radius: 16px;
            margin: 1rem 0;
        }

        .detail-img img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .detail-description {
            margin: 1rem 0;
        }

        .meta-row {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 0.5rem 0;
        }

        .inline-badge {
            display: inline-block;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-weight: normal;
        }

        button {
            background: var(--btn-bg);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            background: var(--btn-hover);
        }

        .report-btn {
            background: var(--primary);
            margin-bottom: 1rem;
        }

        .back-btn {
            background: var(--text-light);
            margin-bottom: 1rem;
        }

        .footer {
            text-align: center;
            padding: 1.5rem 0;
            margin-top: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            margin: 0 0.5rem;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            max-width: 500px;
            width: 90%;
            border-radius: 24px;
            padding: 1.5rem;
        }

        .collapsible {
            background: var(--primary-dark);
            color: white;
            cursor: pointer;
            padding: 1rem;
            width: 100%;
            border: none;
            text-align: left;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 40px;
            margin: 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .collapsible:hover {
            background: var(--primary);
        }
        .collapsible-content {
            display: none;
            overflow: hidden;
        }
        .collapsible-content.show {
            display: block;
        }

        .training-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
        }
        .training-table th, .training-table td {
            border: 1px solid var(--border);
            padding: 0.6rem;
            text-align: left;
            vertical-align: top;
        }
        .training-table th {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>
    <div class="site-header">
        <div class="container">
            <div class="header-inner">
                <div class="logo">
                    <h1>🚒 FF Nürnberg Stadt</h1>
                    <p>Freiwillige Feuerwehr · Einsatzbereit seit 2020</p>
                </div>
                <div class="toolbar">
                    <button class="tool-btn" id="readBtn">🔊 Vorlesen</button>
                    <button class="tool-btn" id="darkmodeToggle">🌙 Dunkel</button>
                </div>
                <button class="burger" id="burgerBtn">☰ Menü</button>
                <div class="nav-links" id="navLinks">
                    <span class="nav-link" data-page="home">Start</span>
                    <span class="nav-link" data-page="vehicles">Fahrzeuge</span>
                    <span class="nav-link" data-page="specialgroups">Fachgruppen</span>
                    <span class="nav-link" data-page="training">Dienstplan</span>
                    <span class="nav-link" data-page="reports">Einsatzberichte</span>
                    <span class="nav-link" data-page="partners">Partner</span>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="pageContent"></div>
    </div>

    <div class="footer">
        <div class="container">
            <span>© Freiwillige Feuerwehr Nürnberg Stadt – Webseite für ein Rollenspiel (RP) auf FiveM / GTA-RP</span><br>
            <a id="cityLink" href="#" target="_blank">← Zurück zur RP‑Startseite</a> |
            <a id="impressumLink">Impressum</a> |
            <a id="datenschutzLink">Datenschutz</a>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Impressum</h3>
            <div id="modalBody"></div>
            <button id="closeModal">Schließen</button>
        </div>
    </div>

    <script>
        // --------------------------------------------------------------
        // BILDPFADE (Platzhalter – du kannst später eigene Bilder ersetzen)
        // --------------------------------------------------------------
        function getImageSrc(name) {
            return "https://via.placeholder.com/300x200?text=" + encodeURIComponent(name);
        }

        // --------------------------------------------------------------
        // FAHRZEUGDATEN (aktiv + ausgemustert)
        // --------------------------------------------------------------
        let vehiclesActive = [
            { id: "a1", name: "KdoW", funk: "Florian Nürnberg 2/10-1", baujahr: "2026", besatzung: "1/4", text: "BF Caddy · Digitalfunk, Laptop, Lagekarte", image: "KdoW", details: "Führungsfahrzeug für kleinere und mittlere Lagen. Ausgestattet mit Digitalfunk, Laptop mit Lagekarte und Einsatzführungssoftware." },
            { id: "a2", name: "HLF 16/25 (alt)", funk: "Florian Nürnberg 2/40-1", baujahr: "2001", besatzung: "1/8", text: "Gebraucht von der BF · 1.600 l/min, 2.500 l Wasser", image: "HLF_16_25", details: "Motorprobleme, Ersatz geplant. TÜV läuft November 2026 aus. Keine TS an Bord. Zieht FwA-Umwelt, Gulasch, Boot, NEA. Ausstattung: Plasmabrenner, 6 kVA Stromerzeuger, 6 Atemschutzgeräte, 2x CSA 3, 4x CSA 1. LED-Heckwarnanlage mit vier Blitzern, Frontblitzer neben Kühlergrill.", defect: true },
            { id: "a3", name: "GW-L1 (defekt)", funk: "Florian Nürnberg 2/55-1", baujahr: "2012", besatzung: "1/5", text: "Schnuckis Werkstatt · defekt (Dieselverbrauch)", image: "GW_L1", details: "Notfall-Zugfahrzeug (nur City). Extrem hoher Dieselverbrauch. Wird 2026 ersetzt. Rollcontainer: RC Rettungsplattform, RC Verpflegung, RC Kühlschrank, RC Drohne, RC Heizung, RC Schnelleinsatzzelt. LED-Blaulichter, Heckwarnanlage mit runden Blitzern.", defect: true },
            { id: "a4", name: "MTW (neu)", funk: "Florian Nürnberg 2/14-1", baujahr: "2026", besatzung: "1/7", text: "Eigenbau · 7 Sitze", image: "MTW", details: "Zieht Bootsanhänger. 7 Sitzplätze. Eigenausbau durch Feuerwehrkameraden." },
            { id: "a5", name: "GW Drohne", funk: "Kater Nürnberg 0/59-1", baujahr: "2025", besatzung: "1/3", text: "Messfahrzeug, 4 PA in Euroboxen", image: "GW_Drohne", details: "Messkomponente: 4‑Gas, Strahlenmesstechnik. 4 PA-Geräte in Euroboxen (keine festen Plätze)." },
            { id: "a6", name: "LF 20 KatS", funk: "Florian Nürnberg 2/41-1", baujahr: "2026 (geplant)", besatzung: "1/8", text: "2.000 l Wasser, 120 l Schaum, 3.000 l/min Pumpe", image: "LF_20_KatS", details: "Noch nicht im Dienst (Außendienst). Zusatz: Kombigerät Rettungssatz, 8 CSA 1, Filtergeräte.", notActive: true },
            { id: "a7", name: "FwA-Umwelt", text: "TS 16/8 BMW-Boxer", image: "FwA_Umwelt", category: "trailer", details: "TS 16/8 mit BMW Boxermotor (35 kW / 46 PS), 1.600 l/min bei 8 bar. Ölsperren, Bindemittel, Tauchpumpen. Zugfahrzeug: HLF 16/25." },
            { id: "a8", name: "FwA-Gulasch", text: "250 Portionen, Feuerbetrieb", image: "FwA_Gulasch", category: "trailer", details: "Feuerbetrieb (Holz). 250 Portionen. Küchenwerkzeug, keine Tische/Stühle. Offroad mit GW-L1, sonst HLF 16/25." },
            { id: "a9", name: "FwA-NEA 250", text: "250 kVA Notstrom", image: "FwA_NEA_250", category: "trailer", details: "LED-Lichtmast, Scania-Motor. Nur HLF 16/25 als Zugfahrzeug." },
            { id: "a10", name: "Bootsanhänger", text: "Bootsname Helmut, Funk 2/99-1", image: "Bootsanhaenger", category: "trailer", details: "Schlauchboot mit 4 Plätzen. Funkrufname Boot: Florian Nürnberg 2/99-1. Zugfahrzeug: MTW, KdoW, GW-L1 (Notfall)." },
            { id: "a11", name: "Melde-Motorrad", funk: "Florian Nürnberg 2/17-1", baujahr: "unbekannt", besatzung: "1/1", text: "Western Police Bike, Traditionsfahrzeug", image: "Melde_Motorrad", details: "Amerikanisches Polizeimotorrad, traditionelles Blaulicht, reines Melde- und Erkundungsfahrzeug. Seltene Sonderfahrten." }
        ];

        let vehiclesRetired = [
            { id: "r1", name: "LF 16 TS (LSHD)", funk: "kein Funkrufname (historisch)", baujahr: "ca. 1965", image: "LF_16_TS", details: "Erstes eigenes Löschfahrzeug (vorher nur Reserveeinheit bei der BF).", serviceFrom: "ca. 1965", serviceUntil: "ca. 1970" },
            { id: "r2", name: "LF 15 (Magirus-Deutz)", funk: "kein Funkrufname (historisch)", baujahr: "1950", image: "LF_15", details: "Von einer befreundeten Ortswehr übernommen (Standort nicht mehr existent).", serviceFrom: "ca. 1970", serviceUntil: "1985" },
            { id: "r3", name: "VW Golf", funk: "kein Funkrufname (Dienstfahrzeug)", baujahr: "1985", image: "VW_Golf", details: "Dienstfahrzeug für Transport- und Führungsaufgaben.", serviceFrom: "1985", serviceUntil: "2000" },
            { id: "r4", name: "VW T4 (altes MTW)", funk: "Florian Nürnberg 2/14-1 (früher)", baujahr: "2000", image: "VW_T4", details: "Eigenausbau zum MTW. Nach Unfall 2017 außer Dienst.", serviceFrom: "2000", serviceUntil: "2017" }
        ];

        // Fachgruppen
        const specialGroups = [
            { name: "Luftunterstützung / Drohne", description: "Einsatz von Drohnen zur Lageerkundung, Wärmebild und Messflügen. Fahrzeug: GW Drohne." },
            { name: "Umwelt & Gefahrgut", description: "Zuständig für Umwelteinsätze, Öl-/Chemieunfälle, Messtechnik. Fahrzeuge: GW Drohne, FwA-Umwelt." },
            { name: "Verpflegung", description: "Einsatzverpflegung bei Großeinsätzen. Fahrzeug: FwA-Gulasch (TFK 250)." },
            { name: "Wasserrettung", description: "Unterstützung der Berufsfeuerwehr. Boot 'Helmut' (2/99-1). Zugfahrzeuge: MTW, KdoW." },
            { name: "Katastrophenschutz", description: "Fahrzeuge für den Katastrophenschutz: GW Drohne, LF 20 KatS." }
        ];

        // Partner
        let partners = [
            { name: "BEFT Modding Team", image: "BEFT", description: "Design für Einsatzfahrzeuge & Fahrzeugbereitstellung", link: "https://discord.gg/beft" },
            { name: "Bergung Wolf", image: "Bergung_Wolf", description: "Unterstützung auf dem Server Nürnberg RP", link: "https://discord.gg/bergungwolf" }
        ];

        let reports = [];
        let currentPage = "home";
        let currentDetailId = null;
        let currentDetailIsRetired = false;
        let isReading = false;
        let currentUtterance = null;

        function saveData() {
            localStorage.setItem("ff_reports", JSON.stringify(reports));
            localStorage.setItem("ff_partners", JSON.stringify(partners));
        }
        function loadData() {
            const r = localStorage.getItem("ff_reports");
            if (r) reports = JSON.parse(r);
            else reports = [];
            const p = localStorage.getItem("ff_partners");
            if (p) partners = JSON.parse(p);
        }
        loadData();

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, (m) => (m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;"));
        }

        function saveCurrentState() {
            const state = { page: currentPage, detailId: currentDetailId, detailIsRetired: currentDetailIsRetired };
            localStorage.setItem("ff_state", JSON.stringify(state));
        }

        function restoreState() {
            const state = localStorage.getItem("ff_state");
            if (state) {
                try {
                    const s = JSON.parse(state);
                    currentPage = s.page || "home";
                    currentDetailId = s.detailId || null;
                    currentDetailIsRetired = s.detailIsRetired || false;
                } catch(e) {}
            }
            if (currentDetailId) {
                const vehicle = currentDetailIsRetired ? vehiclesRetired.find(v => v.id === currentDetailId) : vehiclesActive.find(v => v.id === currentDetailId);
                if (vehicle) {
                    renderDetailPage(vehicle, currentDetailIsRetired);
                    return;
                } else {
                    currentDetailId = null;
                    currentPage = "vehicles";
                }
            }
            loadPage(currentPage);
        }

        function showVehicleDetail(vehicle, isRetired = false) {
            currentDetailId = vehicle.id;
            currentDetailIsRetired = isRetired;
            currentPage = "detail";
            saveCurrentState();
            renderDetailPage(vehicle, isRetired);
        }

        function renderDetailPage(vehicle, isRetired) {
            let html = `
                <div class="detail-page">
                    <button id="backToVehiclesBtn" class="back-btn">← Zurück zur Fahrzeugübersicht</button>
                    <div class="detail-header">${escapeHtml(vehicle.name)}</div>
                    ${vehicle.funk ? `<div class="funk-badge">📻 ${escapeHtml(vehicle.funk)}</div>` : ""}
                    <div class="meta-row">
                        ${vehicle.baujahr ? `<div><strong>📅 Baujahr:</strong> ${escapeHtml(vehicle.baujahr)}</div>` : ""}
                        ${vehicle.besatzung ? `<div><strong>👥 Besatzung:</strong> ${escapeHtml(vehicle.besatzung)}</div>` : ""}
                        ${vehicle.serviceFrom ? `<div><strong>📅 Im Dienst:</strong> ${escapeHtml(vehicle.serviceFrom)} – ${escapeHtml(vehicle.serviceUntil)}</div>` : ""}
                    </div>
                    <div class="detail-img">
                        <img src="${getImageSrc(vehicle.image)}" alt="${escapeHtml(vehicle.name)}" loading="lazy">
                    </div>
                    <div class="detail-description">
                        <strong>Beschreibung / Technik:</strong>
                        <p>${escapeHtml(vehicle.details || vehicle.text)}</p>
                    </div>
                    ${!isRetired && vehicle.defect ? `<div class="defect-badge inline-badge">⚠️ techn. Problem / Defekt</div>` : ""}
                    ${!isRetired && vehicle.notActive ? `<div class="defect-badge inline-badge">⏳ noch nicht im Dienst (Außendienst)</div>` : ""}
                </div>
            `;
            document.getElementById("pageContent").innerHTML = html;
            document.getElementById("backToVehiclesBtn").onclick = () => {
                currentDetailId = null;
                loadPage("vehicles");
            };
        }

        function renderHome() {
            return `
                <div class="hero" style="background-image: url('${getImageSrc("hero")}');">
                    <h2>Willkommen bei der Freiwilligen Feuerwehr Nürnberg Stadt</h2>
                    <p>Wir schützen Nürnberg – ehrenamtlich, modern, einsatzbereit.</p>
                </div>
                <div class="grid">
                    <div class="card" data-page="vehicles">
                        <div class="card-content"><h3 class="card-title">🚒 Fahrzeuge</h3><p>Unsere aktuelle Flotte und ausgemusterte Fahrzeuge</p><button class="nav-button">Zur Fahrzeugübersicht →</button></div>
                    </div>
                    <div class="card" data-page="specialgroups">
                        <div class="card-content"><h3 class="card-title">🛠️ Fachgruppen</h3><p>Luftunterstützung, Umwelt, Verpflegung, Wasserrettung, KatS</p><button class="nav-button">Zu den Fachgruppen →</button></div>
                    </div>
                    <div class="card" data-page="training">
                        <div class="card-content"><h3 class="card-title">📅 Dienstplan</h3><p>Ausbildungs- und Dienstplan 2026</p><button class="nav-button">Zum Dienstplan →</button></div>
                    </div>
                </div>
            `;
        }

        function renderVehicles() {
            const activeList = vehiclesActive.map(v => `
                <div class="card" data-id="${v.id}" data-type="active">

        function renderReports() {
            const approved = reports.filter(r => r.status === "approved").reverse();

                <h2>📋 Einsatzberichte</h2>

                <div id="reportFormContainer" style="display:none; margin-bottom:2rem;">
                    <div class="card">
                        <div class="card-content">
                            <h3>Neuen Einsatzbericht einreichen</h3>
                            <div class="form-group"><label>Einsatznummer (frei wählbar):</label><input type="text" id="reportNumber" placeholder="z. B. 2026-001"></div>
                            <div class="form-group"><label>Dein Name (Autor):</label><input type="text" id="reportAuthor" placeholder="Max Mustermann"></div>
                            <div class="form-group"><label>Titel:</label><input type="text" id="reportTitle"></div>
                            <div class="form-group"><label>Datum:</label><input type="date" id="reportDate"></div>
                            <div class="form-group"><label>Einsatzort:</label><input type="text" id="reportLocation"></div>
                            <div class="form-group"><label>Beteiligte Fahrzeuge:</label>
                                <div class="checkbox-group" id="vehicleCheckboxes">
                                    ${vehiclesActive.filter(v => !v.category).map(v => `<label><input type="checkbox" value="${v.id}" data-name="${escapeHtml(v.name)}"> ${escapeHtml(v.name)}</label>`).join("")}

                            </div>

                            <div class="form-group"><label>Einsatzleiter (optional):</label><input type="text" id="incidentCommander"></div>
                            <div class="form-group"><label>Gruppenführer / Truppführer (optional):</label><input type="text" id="groupLeader"></div>
                            <div class="form-group"><label>Einsatzbericht (Text):</label><textarea id="reportText" rows="6"></textarea></div>

                        </div>
                    </div>
                </div>
                <div class="grid reports-grid">
                    ${approved.map(r => `
                        <div class="card">
                            <div class="card-content">
                                <div class="card-title">${escapeHtml(r.title)}</div>
                                <div>📅 ${r.date} | 📍 ${r.location}</div>
                                <div><strong>Einsatznummer:</strong> ${escapeHtml(r.reportNumber)}</div>
                                <div><strong>Autor:</strong> ${escapeHtml(r.author)}</div>
                                <p>${escapeHtml(r.text)}</p>
                                <div><strong>Fahrzeuge:</strong> ${r.vehicleNames || "keine"}</div>
                                ${r.otherOrgs ? `<div><strong>Andere Organisationen:</strong> ${escapeHtml(r.otherOrgs)}</div>` : ""}

        function loadPage(page) {
            currentPage = page;
            currentDetailId = null;
            saveCurrentState();
            let html = "";
            if (page === "home") html = renderHome();
            else if (page === "vehicles") html = renderVehicles();
            else if (page === "specialgroups") html = renderSpecialGroups();
            else if (page === "training") html = renderTraining();
            else if (page === "reports") html = renderReports();
            else if (page === "partners") html = renderPartners();
            document.getElementById("pageContent").innerHTML = html;

            document.querySelectorAll(".nav-link").forEach(link => link.classList.remove("active"));
            document.querySelector(`.nav-link[data-page="${page}"]`).classList.add("active");

            document.querySelectorAll(".card[data-id]").forEach(card => {
                const id = card.dataset.id;
                const type = card.dataset.type;
                if (type === "active") {
                    const vehicle = vehiclesActive.find(v => v.id === id);
                    if (vehicle) card.onclick = () => showVehicleDetail(vehicle, false);
                } else if (type === "retired") {
                    const vehicle = vehiclesRetired.find(v => v.id === id);
                    if (vehicle) card.onclick = () => showVehicleDetail(vehicle, true);
                }
            });
            document.querySelectorAll(".card[data-page]").forEach(card => {
                const p = card.dataset.page;
                card.onclick = () => loadPage(p);
            });
            const collBtn = document.getElementById("retiredCollapseBtn");
            const collDiv = document.getElementById("retiredCollapse");
            if (collBtn && collDiv) {
                collBtn.onclick = () => {
                    collDiv.classList.toggle("show");
                    collBtn.textContent = collDiv.classList.contains("show") ? "📜 Ausgemusterte Fahrzeuge ausblenden ▲" : "📜 Ausgemusterte Fahrzeuge anzeigen ▼";
                };
            }

            if (page === "reports") {
                const showBtn = document.getElementById("showReportFormBtn");
                const formContainer = document.getElementById("reportFormContainer");
                if (showBtn && formContainer) {
                    showBtn.onclick = () => {
                        if (formContainer.style.display === "none") {
                            formContainer.style.display = "block";
                            showBtn.textContent = "✖️ Formular schließen";
                        } else {
                            formContainer.style.display = "none";
                            showBtn.textContent = "+ Bericht einreichen";
                        }
                    };
                    document.getElementById("submitReportBtn")?.addEventListener("click", () => {
                        const reportNumber = document.getElementById("reportNumber")?.value;
                        const author = document.getElementById("reportAuthor")?.value;
                        const title = document.getElementById("reportTitle")?.value;
                        const date = document.getElementById("reportDate")?.value;
                        const location = document.getElementById("reportLocation")?.value;
                        const otherOrgs = document.getElementById("otherOrgs")?.value;
                        const incidentCommander = document.getElementById("incidentCommander")?.value;
                        const groupLeader = document.getElementById("groupLeader")?.value;
                        const text = document.getElementById("reportText")?.value;
                        const selectedBoxes = document.querySelectorAll('#vehicleCheckboxes input:checked');
                        const vehicleNames = Array.from(selectedBoxes).map(cb => cb.getAttribute("data-name")).join(", ");
                        if (!reportNumber || !author || !title || !date || !location || !text) {
                            alert("Bitte alle Pflichtfelder (Einsatznummer, Autor, Titel, Datum, Ort, Bericht) ausfüllen.");
                            return;
                        }
                        reports.push({
                            id: Date.now(),
                            reportNumber, author, title, date, location, otherOrgs, incidentCommander, groupLeader, text,
                            vehicleNames, status: "pending"
                        });
                        saveData();
                        alert("Bericht eingereicht! Er wird nach Prüfung freigeschaltet.");
                        formContainer.style.display = "none";
                        if (showBtn) showBtn.textContent = "+ Bericht einreichen";
                        loadPage("reports");
                    });
                }
            }
        }

        function toggleReading() {
            if (isReading && currentUtterance) {
                speechSynthesis.cancel();
                isReading = false;
                currentUtterance = null;
                document.getElementById("readBtn").textContent = "🔊 Vorlesen";
            } else {
                const content = document.getElementById("pageContent").innerText;
                if (!content) return;
                const utterance = new SpeechSynthesisUtterance(content.substring(0, 3000));
                utterance.lang = "de-DE";
                utterance.onend = () => {
                    isReading = false;
                    currentUtterance = null;
                    document.getElementById("readBtn").textContent = "🔊 Vorlesen";
                };
                speechSynthesis.cancel();
                speechSynthesis.speak(utterance);
                currentUtterance = utterance;
                isReading = true;
                document.getElementById("readBtn").textContent = "⏹️ Stopp";
            }
        }

        function showAdminPanel() {
            const pw = prompt("Admin-Passwort:");
            if (pw !== "adminFF") { alert("Falsches Passwort!"); return; }
            const pending = reports.filter(r => r.status === "pending");
            if (pending.length === 0) { alert("Keine wartenden Berichte."); return; }
            let msg = "Wartende Berichte:\n\n";
            pending.forEach((r, idx) => { msg += `${idx+1}. ${r.title} (${r.date}) von ${r.author}\n`; });
            msg += "\nNummer zum Freischalten:";
            const num = parseInt(prompt(msg));
            if (num && num > 0 && num <= pending.length) {
                pending[num-1].status = "approved";
                saveData();
                alert("Bericht freigeschaltet!");
                if (currentPage === "reports") loadPage("reports");
            }
        }

            document.getElementById("modalTitle").innerText = "Impressum";
            document.getElementById("modalBody").innerHTML = `
                <strong>Projekt:</strong> Nürnberg RP – Freiwillige Feuerwehr Nürnberg (Rollenspiel)<br>
                <strong>Vertreten durch:</strong> FireBenni<br>
                <strong>Kontakt:</strong> <a href="https://discord.gg/bQqCNfnZ4W" target="_blank">Discord-Server</a><br>
                <strong>Hinweis:</strong> Diese Webseite dient ausschließlich dem Rollenspiel im Rahmen von FiveM / GTA-RP.
            `;
            document.getElementById("modal").style.display = "flex";
        }
        function showDatenschutz() {
            document.getElementById("modalTitle").innerText = "Datenschutzerklärung";
            document.getElementById("modalBody").innerHTML = `
                Diese Webseite speichert keine personenbezogenen Daten. Keine Cookies. Lokale Speicherung (LocalStorage) für Einstellungen und Berichte.<br>
                Verantwortlich: FireBenni · Stand April 2026.
            `;
            document.getElementById("modal").style.display = "flex";
        }

        document.getElementById("burgerBtn").onclick = () => document.getElementById("navLinks").classList.toggle("show");
        document.querySelectorAll(".nav-link").forEach(link => {
            link.onclick = () => {
                loadPage(link.dataset.page);
                document.getElementById("navLinks").classList.remove("show");
            };
        });
        document.getElementById("darkmodeToggle").onclick = () => document.body.classList.toggle("dark");
        document.getElementById("readBtn").onclick = toggleReading;
        document.getElementById("cityLink").href = "https://dein-rp-server.de"; // HIER DEINE RP-STARTSEITE EINTRAGEN
        document.getElementById("impressumLink").onclick = showImpressum;
        document.getElementById("datenschutzLink").onclick = showDatenschutz;
        document.getElementById("closeModal").onclick = () => document.getElementById("modal").style.display = "none";
        document.addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.altKey && e.key === "a") {
                e.preventDefault();
                showAdminPanel();
            }
        });
        if (window.matchMedia("(prefers-color-scheme: dark)").matches) document.body.classList.add("dark");

        restoreState();
    </script>
