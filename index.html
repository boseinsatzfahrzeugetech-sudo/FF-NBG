<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FF Nürnberg Stadt – Freiwillige Feuerwehr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --primary: #1e5f8e;
            --primary-dark: #164e73;
            --border: #e2e8f0;
            --header-bg: #ffffff;
            --badge-bg: #eef2ff;
            --badge-text: #1e40af;
            --btn-bg: #1e5f8e;
            --btn-hover: #164e73;
        }

        body.dark {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --border: #334155;
            --header-bg: #1e293b;
            --badge-bg: #1e3a8a;
            --badge-text: #bfdbfe;
            --btn-bg: #3b82f6;
            --btn-hover: #2563eb;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .site-header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }

        .logo p {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .toolbar {
            display: flex;
            gap: 0.5rem;
        }

        .tool-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text);
        }

        .burger {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text);
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.1s;
            color: var(--text);
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary);
            color: white;
        }

        @media (max-width: 768px) {
            .burger {
                display: block;
            }
            .nav-links {
                display: none;
                flex-direction: column;
                width: 100%;
                background: var(--card-bg);
                border-radius: 16px;
                padding: 1rem;
                margin-top: 0.5rem;
            }
            .nav-links.show {
                display: flex;
            }
        }

        .hero {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 3rem 2rem;
            border-radius: 24px;
            margin: 2rem 0;
            text-align: center;
        }

        .hero h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .section-header {
            font-size: 1.6rem;
            margin: 1.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.1s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-img {
            width: 100%;
            height: 160px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .funk-badge {
            font-size: 0.7rem;
            background: var(--badge-bg);
            color: var(--badge-text);
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin: 0.3rem 0;
        }

        .defect-badge {
            background: #dc2626;
            color: white;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
            margin-left: 0.5rem;
        }

        .future-badge {
            background: #f59e0b;
            color: white;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
            margin-left: 0.5rem;
        }

        .retired-badge {
            background: #6b7280;
            color: white;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
            margin-left: 0.5rem;
        }

        .service-period {
            font-size: 0.7rem;
            color: var(--text-light);
            margin: 0.3rem 0;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text);
        }

        button {
            background: var(--btn-bg);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            background: var(--btn-hover);
        }

        .report-btn {
            background: var(--primary);
            margin-bottom: 1rem;
        }

        .history-text {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            margin: 1rem 0;
            column-count: 2;
            column-gap: 2rem;
        }

        .history-text p {
            margin-bottom: 1rem;
            break-inside: avoid;
        }

        @media (max-width: 768px) {
            .history-text {
                column-count: 1;
            }
        }

        .footer {
            text-align: center;
            padding: 1.5rem 0;
            margin-top: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="site-header">
        <div class="container">
            <div class="header-inner">
                <div class="logo">
                    <h1>🚒 FF Nürnberg Stadt</h1>
                    <p>Freiwillige Feuerwehr · Einsatzbereit seit 2020</p>
                </div>
                <div class="toolbar">
                    <button class="tool-btn" id="darkmodeToggle">🌙 Dunkel</button>
                </div>
                <button class="burger" id="burgerBtn">☰ Menü</button>
                <div class="nav-links" id="navLinks">
                    <span class="nav-link active" data-page="home">Start</span>
                    <span class="nav-link" data-page="vehicles">Fahrzeuge</span>
                    <span class="nav-link" data-page="history">Geschichte</span>
                    <span class="nav-link" data-page="reports">Einsatzberichte</span>
                    <span class="nav-link" data-page="partners">Partner</span>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="pageContent"></div>
    </div>

    <div class="footer">
        <div class="container">
            <span>© FF Nürnberg Stadt · Alle Angaben ohne Gewähr</span>
        </div>
    </div>

    <script>
        // ---------- DATEN ----------
        let vehiclesActive = [
            { id: 1, name: "KdoW", funk: "Florian Nürnberg 2/10-1", baujahr: "2026", besatzung: "1/4", text: "BF Caddy · Digitalfunk, Laptop, Lagekarte", image: "https://dunb17ur4ymx4.cloudfront.net/packages/images/634a4930f5e43ac3eb1e5c9d0ada4aaf3efff763.png", details: "Führungsfahrzeug für kleinere und mittlere Lagen." },
            { id: 2, name: "HLF 16/25", funk: "Florian Nürnberg 2/40-1", baujahr: "2001", besatzung: "1/8", text: "Gebraucht von der BF · 1.600 l/min, 2.500 l Wasser", image: "https://i0.wp.com/schnuckis-werkstatt.de/wp-content/uploads/2024/09/hlf2-3.png?resize=1536%2C864&ssl=1", details: "Motorprobleme, Ersatz geplant.", defect: true },
            { id: 3, name: "GW-L1", funk: "Florian Nürnberg 2/55-1", baujahr: "2012", besatzung: "1/5", text: "Schnuckis Werkstatt · defekt (Dieselverbrauch)", image: "https://i0.wp.com/schnuckis-werkstatt.de/wp-content/uploads/2024/10/gwl1.png?fit=1919%2C1079&ssl=1", details: "Notfall-Zugfahrzeug (nur City).", defect: true },
            { id: 4, name: "MTW", funk: "Florian Nürnberg 2/14-1", baujahr: "2026", besatzung: "1/7", text: "Eigenbau · 7 Sitze", image: "https://rovocad.de/wp-content/uploads/2017/08/Platzhalter.jpg", details: "Zieht Bootsanhänger." },
            { id: 5, name: "GW Drohne", funk: "Kater Nürnberg 0/59-1", baujahr: "2025", besatzung: "1/3", text: "Messfahrzeug, 4 PA in Euroboxen", image: "https://cdn.discordapp.com/attachments/1040330298455507006/1356883729636786226/image.png?ex=69f3a4b2&is=69f25332&hm=d29b671dc155f46da351eb9e24a54ce9a71b0e2d05b028faa2ca3ee5355eab79&", details: "4‑Gas, Strahlenmesstechnik" },
            { id: 6, name: "LF 20 KatS", funk: "Florian Nürnberg 2/41-1", baujahr: "2026", besatzung: "1/8", text: "2.000 l Wasser, 120 l Schaum, 3.000 l/min Pumpe", image: "https://rovocad.de/wp-content/uploads/2017/08/Platzhalter.jpg", details: "Noch nicht im Dienst (Außendienst / wartet auf Indienststellung).", notActive: true },
            { id: 7, name: "FwA-Umwelt", baujahr: "1984", text: "TS 16/8 BMW-Boxer", image: "https://i0.wp.com/schnuckis-werkstatt.de/wp-content/uploads/2024/09/tsa1-1-e1746979549946.png?fit=962%2C1044&ssl=1", category: "trailer", details: "Ölsperren, Bindemittel" },
            { id: 8, name: "FwA-Gulasch", baujahr: "1986", text: "250 Portionen, Feuerbetrieb", image: "https://i0.wp.com/schnuckis-werkstatt.de/wp-content/uploads/2024/09/feldkueche1.png?fit=1920%2C1080&ssl=1", category: "trailer", details: "Küchenwerkzeug" },
            { id: 9, name: "FwA-NEA 250", baujahr: "2026", text: "250 kVA Notstrom", image: "https://i0.wp.com/schnuckis-werkstatt.de/wp-content/uploads/2024/09/nea1.png?resize=1536%2C864&ssl=1", category: "trailer", details: "LED-Lichtmast, Scania-Motor" },
            { id: 10, name: "Bootsanhänger", baujahr: "2016/2010", text: "Bootsname Helmut, Funk 2/99-1", image: "https://rovocad.de/wp-content/uploads/2017/08/Platzhalter.jpg", category: "trailer", details: "Wasserrettung" }
        ];

        let vehiclesRetired = [
            { id: 101, name: "LF 16 TS (LSHD)", funk: "kein Funkrufname (historisch)", baujahr: "ca. 1965", image: "https://rovocad.de/wp-content/uploads/2017/08/Platzhalter.jpg", details: "Erstes eigenes Löschfahrzeug (vorher nur Reserveeinheit bei der BF).", serviceFrom: "ca. 1965", serviceUntil: "ca. 1970" },
            { id: 102, name: "LF 15 (Magirus-Deutz)", funk: "kein Funkrufname (historisch)", baujahr: "1950", image: "https://rovocad.de/wp-content/uploads/2017/08/Platzhalter.jpg", details: "Von einer befreundeten Ortswehr übernommen (Standort nicht mehr existent).", serviceFrom: "ca. 1970", serviceUntil: "1985" },
            { id: 103, name: "VW Golf", funk: "kein Funkrufname (Dienstfahrzeug)", baujahr: "1985", image: "https://rovocad.de/wp-content/uploads/2017/08/Platzhalter.jpg", details: "Dienstfahrzeug für Transport- und Führungsaufgaben.", serviceFrom: "1985", serviceUntil: "2000" },
            { id: 104, name: "VW T4 (MTW)", funk: "Florian Nürnberg 2/14-1 (früher)", baujahr: "2000", image: "https://rovocad.de/wp-content/uploads/2017/08/Platzhalter.jpg", details: "Eigenausbau zum MTW. Nach Unfall 2017 außer Dienst.", serviceFrom: "2000", serviceUntil: "2017" }
        ];

        let vehiclesFuture = [
            { id: 201, name: "GW-MZ", funk: "Florian Nürnberg 2/59-1 (geplant)", baujahr: "2025 (geplant)", besatzung: "1/5", text: "Benefactor Runner, Emsberg-Aufbau", image: "https://cdn.discordapp.com/attachments/1438573886609555546/1438573890367652012/2f36ca9cecb4724077632752d8b20feafb0b2169.png?ex=69f38a56&is=69f238d6&hm=4c1733692dbf2b707238ce6a3004db651c97fcc5ce4e9a6b4a1700b40208f8f8&", details: "Kistensystem, Absturzsicherung", visible: false },
            { id: 202, name: "Neues HLF 20", funk: "Florian Nürnberg 2/40-1 (vorauss.)", baujahr: "2026 (geplant)", besatzung: "1/8", text: "3.000 l Wasser, 2.000 l/min Pumpe", image: "https://rovocad.de/wp-content/uploads/2017/08/Platzhalter.jpg", details: "Haspel verbaut → kein Anhängerbetrieb", visible: false }
        ];

        let reports = [];
        let currentPage = "home";

        function saveData() {
            localStorage.setItem("ff_reports", JSON.stringify(reports));
            localStorage.setItem("ff_vehicles_retired", JSON.stringify(vehiclesRetired));
            localStorage.setItem("ff_vehicles_future", JSON.stringify(vehiclesFuture));
        }

        function loadData() {
            const r = localStorage.getItem("ff_reports");
            const ret = localStorage.getItem("ff_vehicles_retired");
            const fut = localStorage.getItem("ff_vehicles_future");
            if (r) reports = JSON.parse(r);
            if (ret) vehiclesRetired = JSON.parse(ret);
            if (fut) vehiclesFuture = JSON.parse(fut);
        }
        loadData();

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, (m) => {
                if (m === "&") return "&amp;";
                if (m === "<") return "&lt;";
                if (m === ">") return "&gt;";
                return m;
            });
        }

        function showVehicleDetail(v) {
            alert(`🔧 ${v.name}\n\nFunk: ${v.funk || "kein"}\nBaujahr: ${v.baujahr || "?"}\nBesatzung: ${v.besatzung || "keine (Anhänger)"}\n\nTechnik:\n${v.details || v.text}`);
        }

        function renderHome() {
            return `
                <div class="hero">
                    <h2>Willkommen bei der Freiwilligen Feuerwehr Nürnberg Stadt</h2>
                    <p>Wir schützen Nürnberg – ehrenamtlich, modern, einsatzbereit.</p>
                </div>
                <div class="grid">
                    <div class="card"><div class="card-content"><h3 class="card-title">🚒 Fahrzeuge</h3><p>Unsere aktuelle Flotte, ausgemusterte Fahrzeuge und geplante Neubeschaffungen</p><button class="nav-button" data-page="vehicles">Zur Fahrzeugübersicht →</button></div></div>
                    <div class="card"><div class="card-content"><h3 class="card-title">📖 Geschichte</h3><p>Über 150 Jahre Feuerwehrgeschichte in Nürnberg</p><button class="nav-button" data-page="history">Zur Geschichte →</button></div></div>
                    <div class="card"><div class="card-content"><h3 class="card-title">🤝 Partner</h3><p>BEFT Modding Team & Bergung Wolf</p><button class="nav-button" data-page="partners">Zu den Partnern →</button></div></div>
                </div>
            `;
        }

        function renderVehicles() {
            const activeList = vehiclesActive.map(v => `
                <div class="card">
                    <div class="card-img">${v.image ? `<img src="${v.image}" loading="lazy">` : "🚒"}</div>
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(v.name)} ${v.defect ? '<span class="defect-badge">⚠️ techn. Problem / Defekt</span>' : v.notActive ? '<span class="future-badge">⏳ noch nicht im Dienst (Außendienst)</span>' : ''}</div>
                        ${v.funk ? `<div class="funk-badge">📻 ${escapeHtml(v.funk)}</div>` : ""}
                        <p>${escapeHtml(v.text)}</p>
                        ${v.besatzung ? `<div><strong>👥 Besatzung:</strong> ${escapeHtml(v.besatzung)}</div>` : ""}
                        <button class="detail-btn" data-id="${v.id}" data-type="active">Details</button>
                    </div>
                </div>
            `).join("");

            const retiredList = vehiclesRetired.map(v => `
                <div class="card">
                    <div class="card-img">${v.image ? `<img src="${v.image}" loading="lazy">` : "🚒"}</div>
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(v.name)} <span class="retired-badge">📅 ausgemustert</span></div>
                        ${v.funk ? `<div class="funk-badge">📻 ${escapeHtml(v.funk)}</div>` : ""}
                        <div class="service-period">Im Dienst: ${v.serviceFrom} – ${v.serviceUntil}</div>
                        <p>${escapeHtml(v.details)}</p>
                        <button class="detail-retired" data-id="${v.id}">Details</button>
                    </div>
                </div>
            `).join("");

            const futureVisible = vehiclesFuture.filter(v => v.visible === true);
            const futureList = futureVisible.map(v => `
                <div class="card">
                    <div class="card-img">${v.image ? `<img src="${v.image}" loading="lazy">` : "🚒"}</div>
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(v.name)} <span class="future-badge">🔮 geplant / in Beschaffung</span></div>
                        ${v.funk ? `<div class="funk-badge">📻 ${escapeHtml(v.funk)}</div>` : ""}
                        <p>${escapeHtml(v.text)}</p>
                        ${v.besatzung ? `<div><strong>👥 Besatzung:</strong> ${escapeHtml(v.besatzung)}</div>` : ""}
                        <button class="detail-future" data-id="${v.id}">Details</button>
                    </div>
                </div>
            `).join("");

            return `
                <h2 class="section-header">🚒 Aktive Flotte (im Dienst)</h2>
                <div class="grid">${activeList}</div>
                <h2 class="section-header">📜 Ausgemusterte Fahrzeuge (Historie)</h2>
                <div class="grid">${retiredList}</div>
                ${futureVisible.length > 0 ? `<h2 class="section-header">🔮 Geplante Zukunftsfahrzeuge</h2><div class="grid">${futureList}</div>` : ""}
            `;
        }

        function renderHistory() {
            return `
                <h2>📖 Geschichte der Freiwilligen Feuerwehr Nürnberg</h2>
                <div class="history-text">
                    <p>Die Wurzeln der heutigen Freiwilligen Feuerwehr Nürnberg reichen bis in die Mitte des 19. Jahrhunderts zurück. Um etwa 1850 entstand in der Stadt eine erste organisierte Bürger- und Wachstruktur im Bereich des Brandschutzes.</p>
                    <p>Im Jahr 1869 wurde diese ursprüngliche Wachstruktur wieder aufgelöst. Zwischen 1898 und 1925 existierte keine eigenständige Struktur. 1925 erfolgte die Neugründung in einer ehemaligen Halle der Berufsfeuerwehr.</p>
                    <p>Lange Zeit war die Einheit nur Reserveeinheit bei der Berufsfeuerwehr. Das erste eigene Löschfahrzeug war das LF 16 TS (LSHD), das ca. 1965 beschafft wurde. Es folgte ein LF 15 (Magirus-Deutz), das von einer befreundeten Ortswehr übernommen wurde.</p>
                    <p>Im Jahr 1985 wurde ein VW Golf als Dienstfahrzeug angeschafft, 2000 abgelöst durch einen VW T4 (Eigenausbau zum MTW). 1995 wurde ein LF 16/12 von der BF übernommen.</p>
                    <p>Nach der Wiedervereinigung wurde eine TSA übernommen, 2001 eine Feldküche, 2008 Umbau zum FwA-Umwelt. 2010 wurde das HLF 16/25 übernommen, 2012 der GW-L1.</p>
                    <p>2022 erfolgte der Umzug in die provisorische Rettungswache. 2025 kam der GW Drohne hinzu. 2026 stehen große Veränderungen an: GW-L1 und HLF werden außer Dienst gestellt, Ersatz ist geplant. Das LF 20 KatS wartet auf seine Indienststellung.</p>
                    <p>Heute ist die FF Nürnberg eine moderne, flexibel strukturierte Einheit mit Fahrzeugen aus Feuerwehr, KatS, Umwelttechnik und Wasserrettung.</p>
                </div>
            `;
        }

        function renderReports() {
            const approved = reports.filter(r => r.status === "approved").reverse();
            return `
                <h2>📋 Einsatzberichte</h2>
                <button id="showReportFormBtn" class="report-btn">+ Bericht einreichen</button>
                <div id="reportFormContainer" style="display:none; margin-bottom:2rem;">
                    <div class="card">
                        <div class="card-content">
                            <h3>Neuen Einsatzbericht einreichen</h3>
                            <div class="form-group"><label>Dein Name (Benutzername):</label><input type="text" id="reportAuthor" placeholder="z. B. Max Mustermann"></div>
                            <div class="form-group"><label>Titel:</label><input type="text" id="reportTitle"></div>
                            <div class="form-group"><label>Datum:</label><input type="date" id="reportDate"></div>
                            <div class="form-group"><label>Einsatzort:</label><input type="text" id="reportLocation"></div>
                            <div class="form-group"><label>Beteiligte Fahrzeuge:</label><div id="vehicleCheckboxes">${vehiclesActive.filter(v => !v.category).map(v => `<label style="display:inline-block; margin-right:1rem;"><input type="checkbox" value="${v.id}" data-name="${escapeHtml(v.name)}"> ${escapeHtml(v.name)}</label>`).join("")}</div></div>
                            <div class="form-group"><label>Andere Organisationen:</label><input type="text" id="otherOrgs" placeholder="Polizei, THW, Luftrettung..."></div>
                            <div class="form-group"><label>Gruppenführer / Truppführer:</label><input type="text" id="groupLeader" placeholder="z. B. OBM Mustermann"></div>
                            <div class="form-group"><label>Einsatzleiter (optional):</label><input type="text" id="incidentCommander" placeholder="kann freigelassen werden"></div>
                            <div class="form-group"><label>Einsatzbericht:</label><textarea id="reportText" rows="6"></textarea></div>
                            <button id="submitReportBtn">Einreichen</button>
                        </div>
                    </div>
                </div>
                <div class="grid">
                    ${approved.map(r => `
                        <div class="card">
                            <div class="card-content">
                                <div class="card-title">${escapeHtml(r.title)}</div>
                                <div>📅 ${r.date} | 📍 ${r.location}</div>
                                <p>${escapeHtml(r.text)}</p>
                                <div><strong>👤 Autor:</strong> ${escapeHtml(r.author)}</div>
                                <div><strong>Fahrzeuge:</strong> ${r.vehicleNames || "keine"}</div>
                                ${r.otherOrgs ? `<div><strong>Andere Organisationen:</strong> ${escapeHtml(r.otherOrgs)}</div>` : ""}
                                ${r.groupLeader ? `<div><strong>Gruppenführer/Truppführer:</strong> ${escapeHtml(r.groupLeader)}</div>` : ""}
                                ${r.incidentCommander ? `<div><strong>Einsatzleiter:</strong> ${escapeHtml(r.incidentCommander)}</div>` : ""}
                            </div>
                        </div>
                    `).join("")}
                </div>
            `;
        }

        function renderPartners() {
            return `
                <h2>🤝 Unsere Partner</h2>
                <div class="grid">
                    <div class="card">
                        <div class="card-img"><img src="https://rovocad.de/wp-content/uploads/2017/08/Platzhalter.jpg" alt="BEFT Modding"></div>
                        <div class="card-content"><h3 class="card-title">BEFT Modding Team</h3><p>Design für Einsatzfahrzeuge & Fahrzeugbereitstellung</p></div>
                    </div>
                    <div class="card">
                        <div class="card-img"><img src="https://rovocad.de/wp-content/uploads/2017/08/Platzhalter.jpg" alt="Bergung Wolf"></div>
                        <div class="card-content"><h3 class="card-title">Bergung Wolf</h3><p>Unterstützung auf dem Server Nürnberg RP</p></div>
                    </div>
                </div>
            `;
        }

        function loadPage(page) {
            currentPage = page;
            let html = "";
            if (page === "home") html = renderHome();
            else if (page === "vehicles") html = renderVehicles();
            else if (page === "history") html = renderHistory();
            else if (page === "reports") html = renderReports();
            else if (page === "partners") html = renderPartners();
            document.getElementById("pageContent").innerHTML = html;

            document.querySelectorAll(".nav-link").forEach(link => link.classList.remove("active"));
            document.querySelector(`.nav-link[data-page="${page}"]`).classList.add("active");

            document.querySelectorAll(".detail-btn").forEach(btn => {
                const id = parseInt(btn.dataset.id);
                const vehicle = vehiclesActive.find(v => v.id === id);
                if (vehicle) btn.onclick = () => showVehicleDetail(vehicle);
            });
            document.querySelectorAll(".detail-retired").forEach(btn => {
                const id = parseInt(btn.dataset.id);
                const vehicle = vehiclesRetired.find(v => v.id === id);
                if (vehicle) btn.onclick = () => alert(`🚒 ${vehicle.name}\n\nFunk: ${vehicle.funk || "kein"}\nBaujahr: ${vehicle.baujahr}\nIm Dienst: ${vehicle.serviceFrom} – ${vehicle.serviceUntil}\n\n${vehicle.details}`);
            });
            document.querySelectorAll(".nav-button").forEach(btn => {
                btn.onclick = () => loadPage(btn.dataset.page);
            });

            const showBtn = document.getElementById("showReportFormBtn");
            const formContainer = document.getElementById("reportFormContainer");
            if (showBtn && formContainer) {
                showBtn.onclick = () => {
                    if (formContainer.style.display === "none") {
                        formContainer.style.display = "block";
                        showBtn.textContent = "✖️ Formular schließen";
                    } else {
                        formContainer.style.display = "none";
                        showBtn.textContent = "+ Bericht einreichen";
                    }
                };
                document.getElementById("submitReportBtn")?.addEventListener("click", () => {
                    const author = document.getElementById("reportAuthor")?.value;
                    const title = document.getElementById("reportTitle")?.value;
                    const date = document.getElementById("reportDate")?.value;
                    const location = document.getElementById("reportLocation")?.value;
                    const otherOrgs = document.getElementById("otherOrgs")?.value;
                    const groupLeader = document.getElementById("groupLeader")?.value;
                    const incidentCommander = document.getElementById("incidentCommander")?.value;
                    const text = document.getElementById("reportText")?.value;
                    const selectedBoxes = document.querySelectorAll('#vehicleCheckboxes input:checked');
                    const vehicleIds = Array.from(selectedBoxes).map(cb => parseInt(cb.value));
                    const vehicleNames = Array.from(selectedBoxes).map(cb => cb.getAttribute("data-name")).join(", ");
                    if (!author || !title || !date || !location || !text) {
                        alert("Bitte alle Pflichtfelder ausfüllen.");
                        return;
                    }
                    reports.push({ id: Date.now(), author, title, date, location, otherOrgs, groupLeader, incidentCommander, text, vehicleIds, vehicleNames, status: "pending" });
                    saveData();
                    alert("Bericht eingereicht! Er wird nach Prüfung freigeschaltet.");
                    formContainer.style.display = "none";
                    if (showBtn) showBtn.textContent = "+ Bericht einreichen";
                    loadPage("reports");
                });
            }
        }

        function showAdminPanel() {
            const pw = prompt("Admin-Passwort:");
            if (pw !== "adminFF") { alert("Falsches Passwort!"); return; }
            let msg = "Admin-Optionen:\n1. Einsatzberichte freischalten\n2. Ausgemusterte Fahrzeuge verwalten\n3. Zukunftsfahrzeuge sichtbar schalten\n0. Abbrechen";
            const opt = prompt(msg);
            if (opt === "1") {
                const pending = reports.filter(r => r.status === "pending");
                if (pending.length === 0) { alert("Keine wartenden Berichte."); return; }
                let list = "Wartende Berichte:\n\n";
                pending.forEach((r, idx) => { list += `${idx+1}. ${r.title} (${r.date}) von ${r.author}\n`; });
                list += "\nNummer zum Freischalten:";
                const num = parseInt(prompt(list));
                if (num && num > 0 && num <= pending.length) {
                    pending[num-1].status = "approved";
                    saveData();
                    alert("Bericht freigeschaltet!");
                    if (currentPage === "reports") loadPage("reports");
                }
            } else if (opt === "2") {
                let action = prompt("Ausgemusterte Fahrzeuge:\nNeu hinzufügen? (ja/nein)");
                if (action === "ja") {
                    let name = prompt("Fahrzeugname:");
                    let funk = prompt("Funkrufname (falls bekannt, sonst leer lassen):");
                    let baujahr = prompt("Baujahr:");
                    let from = prompt("Dienst von (Jahr):");
                    let until = prompt("Dienst bis (Jahr):");
                    let details = prompt("Beschreibung:");
                    let image = prompt("Bild-URL (optional):", "https://rovocad.de/wp-content/uploads/2017/08/Platzhalter.jpg");
                    if (name && baujahr && from && until) {
                        let newId = Math.max(...vehiclesRetired.map(v => v.id), 0) + 1;
                        vehiclesRetired.push({ id: newId, name, funk: funk || "kein Funkrufname (historisch)", baujahr, image: image || "https://rovocad.de/wp-content/uploads/2017/08/Platzhalter.jpg", details, serviceFrom: from, serviceUntil: until });
                        saveData();
                        alert("Fahrzeug hinzugefügt!");
                        if (currentPage === "vehicles") loadPage("vehicles");
                    }
                }
            } else if (opt === "3") {
                let futureList = vehiclesFuture.map((v, i) => `${i+1}. ${v.name} (sichtbar: ${v.visible ? "ja" : "nein"})`).join("\n");
                let num = parseInt(prompt(`Zukunftsfahrzeuge:\n${futureList}\n\nNummer zum Umschalten der Sichtbarkeit:`));
                if (num && num > 0 && num <= vehiclesFuture.length) {
                    vehiclesFuture[num-1].visible = !vehiclesFuture[num-1].visible;
                    saveData();
                    alert(`Sichtbarkeit für ${vehiclesFuture[num-1].name} auf ${vehiclesFuture[num-1].visible ? "sichtbar" : "unsichtbar"} gesetzt.`);
                    if (currentPage === "vehicles") loadPage("vehicles");
                }
            }
        }

        document.getElementById("burgerBtn").onclick = () => {
            document.getElementById("navLinks").classList.toggle("show");
        };
        document.querySelectorAll(".nav-link").forEach(link => {
            link.onclick = () => {
                loadPage(link.dataset.page);
                document.getElementById("navLinks").classList.remove("show");
            };
        });
        document.addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.altKey && e.key === "a") {
                e.preventDefault();
                showAdminPanel();
            }
        });
        document.getElementById("darkmodeToggle").onclick = () => {
            document.body.classList.toggle("dark");
        };
        if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            document.body.classList.add("dark");
        }
        loadPage("home");
    </script>
</body>
</html>
