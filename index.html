<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FF Nürnberg Stadt – Freiwillige Feuerwehr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --primary: #1e5f8e;
            --primary-dark: #164e73;
            --border: #e2e8f0;
            --header-bg: #ffffff;
            --badge-bg: #eef2ff;
            --badge-text: #1e40af;
            --btn-bg: #1e5f8e;
            --btn-hover: #164e73;
        }

        body.dark {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --border: #334155;
            --header-bg: #1e293b;
            --badge-bg: #1e3a8a;
            --badge-text: #bfdbfe;
            --btn-bg: #3b82f6;
            --btn-hover: #2563eb;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .site-header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }

        .logo p {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .toolbar {
            display: flex;
            gap: 0.5rem;
        }

        .tool-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text);
        }

        .burger {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text);
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.1s;
            color: var(--text);
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary);
            color: white;
        }

        @media (max-width: 768px) {
            .burger {
                display: block;
            }
            .nav-links {
                display: none;
                flex-direction: column;
                width: 100%;
                background: var(--card-bg);
                border-radius: 16px;
                padding: 1rem;
                margin-top: 0.5rem;
            }
            .nav-links.show {
                display: flex;
            }
        }

        .hero {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 3rem 2rem;
            border-radius: 24px;
            margin: 2rem 0;
            text-align: center;
            background-size: cover;
            background-position: center;
        }

        .hero h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .section-header {
            font-size: 1.6rem;
            margin: 1.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.1s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-img {
            width: 100%;
            height: 160px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .funk-badge {
            font-size: 0.7rem;
            background: var(--badge-bg);
            color: var(--badge-text);
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin: 0.3rem 0;
        }

        .defect-badge {
            background: #dc2626;
            color: white;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
            margin-left: 0.5rem;
        }

        .retired-badge {
            background: #6b7280;
            color: white;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
            margin-left: 0.5rem;
        }

        .service-period {
            font-size: 0.7rem;
            color: var(--text-light);
            margin: 0.3rem 0;
        }

        .detail-page {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2rem;
            margin: 1rem 0;
        }

        .detail-header {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .detail-img {
            width: 100%;
            max-height: 300px;
            overflow: hidden;
            border-radius: 16px;
            margin: 1rem 0;
        }

        .detail-img img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .detail-description {
            margin: 1rem 0;
        }

        .meta-row {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 0.5rem 0;
        }

        .inline-badge {
            display: inline-block;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-weight: normal;
        }

        button {
            background: var(--btn-bg);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            background: var(--btn-hover);
        }

        .report-btn {
            background: var(--primary);
            margin-bottom: 1rem;
        }

        .back-btn {
            background: var(--text-light);
            margin-bottom: 1rem;
        }

        .footer {
            text-align: center;
            padding: 1.5rem 0;
            margin-top: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            margin: 0 0.5rem;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            max-width: 500px;
            width: 90%;
            border-radius: 24px;
            padding: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="site-header">
        <div class="container">
            <div class="header-inner">
                <div class="logo">
                    <h1>🚒 FF Nürnberg Stadt</h1>
                    <p>Freiwillige Feuerwehr · Einsatzbereit seit 2020</p>
                </div>
                <div class="toolbar">
                    <button class="tool-btn" id="darkmodeToggle">🌙 Dunkel</button>
                </div>
                <button class="burger" id="burgerBtn">☰ Menü</button>
                <div class="nav-links" id="navLinks">
                    <span class="nav-link active" data-page="home">Start</span>
                    <span class="nav-link" data-page="vehicles">Fahrzeuge</span>
                    <span class="nav-link" data-page="specialgroups">Fachgruppen</span>
                    <span class="nav-link" data-page="history">Geschichte</span>
                    <span class="nav-link" data-page="reports">Einsatzberichte</span>
                    <span class="nav-link" data-page="partners">Partner</span>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="pageContent"></div>
    </div>

    <div class="footer">
        <div class="container">
            <span>© Freiwillige Feuerwehr Nürnberg Stadt – Webseite für ein Rollenspiel (RP) auf FiveM / GTA-RP</span><br>
            <a id="impressumLink">Impressum</a> | <a id="datenschutzLink">Datenschutz</a>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Impressum</h3>
            <div id="modalBody"></div>
            <button id="closeModal">Schließen</button>
        </div>
    </div>

    <script>
        // --------------------------------------------------------------
        // BILDPFADE (RELATIV ZUM IMAGES-ORDNER)
        // --------------------------------------------------------------
        const IMG_PATH = "images/";
        const PLACEHOLDER = IMG_PATH + "platzhalter.png";

        function getImage(src) {
            return src ? IMG_PATH + src : PLACEHOLDER;
        }

        // --------------------------------------------------------------
        // DATEN AKTIVE FLOTTE (inkl. defekter Fahrzeuge)
        // --------------------------------------------------------------
        let vehiclesActive = [
            { id: 1, name: "KdoW", funk: "Florian Nürnberg 2/10-1", baujahr: "2026", besatzung: "1/4", text: "BF Caddy · Digitalfunk, Laptop, Lagekarte", image: "kdow.png", details: "Führungsfahrzeug für kleinere und mittlere Lagen. Ausgestattet mit Digitalfunk, Laptop mit Lagekarte und Einsatzführungssoftware." },
            { id: 2, name: "HLF 16/25 (alt, defekt)", funk: "Florian Nürnberg 2/40-1", baujahr: "2001", besatzung: "1/8", text: "Gebraucht von der BF · 1.600 l/min, 2.500 l Wasser", image: "hlf.png", details: "Motorprobleme, Ersatz geplant. Keine TS an Bord. Zieht den FwA-Umwelt.", defect: true },
            { id: 3, name: "GW-L1 (defekt)", funk: "Florian Nürnberg 2/55-1", baujahr: "2012", besatzung: "1/5", text: "Schnuckis Werkstatt · defekt (Dieselverbrauch)", image: "gwl1.png", details: "Notfall-Zugfahrzeug (nur City). Extrem hoher Dieselverbrauch. Wird 2026 ersetzt.", defect: true },
            { id: 4, name: "MTW (neu)", funk: "Florian Nürnberg 2/14-1", baujahr: "2026", besatzung: "1/7", text: "Eigenbau · 7 Sitze", image: "mtw.png", details: "Zieht Bootsanhänger. 7 Sitzplätze. Eigenausbau durch Feuerwehrkameraden." },
            { id: 5, name: "GW Drohne", funk: "Kater Nürnberg 0/59-1", baujahr: "2025", besatzung: "1/3", text: "Messfahrzeug, 4 PA in Euroboxen", image: "gw-drohne.png", details: "4‑Gas, Strahlenmesstechnik. 4 PA-Geräte in Euroboxen (keine festen Plätze)." },
            { id: 6, name: "LF 20 KatS", funk: "Florian Nürnberg 2/41-1", baujahr: "2026", besatzung: "1/8", text: "2.000 l Wasser, 120 l Schaum, 3.000 l/min Pumpe", image: "lf-kats.png", details: "Noch nicht im Dienst (Außendienst / wartet auf Indienststellung). Zusatz: Kombigerät Rettungssatz, 8 CSA 1, Filtergeräte.", notActive: true },
            { id: 7, name: "FwA-Umwelt", baujahr: "1984", text: "TS 16/8 BMW-Boxer", image: "tsa.png", category: "trailer", details: "TS 16/8 mit BMW Boxermotor. Ölsperren, Bindemittel. Zugfahrzeug: HLF 16/25." },
            { id: 8, name: "FwA-Gulasch", baujahr: "1986", text: "250 Portionen, Feuerbetrieb", image: "gulasch.png", category: "trailer", details: "Feuerbetrieb (Holz). 250 Portionen. Küchenwerkzeug, keine Tische/Stühle." },
            { id: 9, name: "FwA-NEA 250", baujahr: "2026", text: "250 kVA Notstrom", image: "nea.png", category: "trailer", details: "LED-Lichtmast, Scania-Motor. Nur HLF 16/25 als Zugfahrzeug." },
            { id: 10, name: "Bootsanhänger", baujahr: "2016/2010", text: "Bootsname Helmut, Funk 2/99-1", image: "boot.png", category: "trailer", details: "Schlauchboot mit 4 Plätzen. Funk: 2/99-1 offiziell, Bootsname 'Helmut'." }
        ];

        // --------------------------------------------------------------
        // AUSGEMUSTERTE FAHRZEUGE (HISTORIE)
        // --------------------------------------------------------------
        let vehiclesRetired = [
            { id: 101, name: "LF 16 TS (LSHD)", funk: "kein Funkrufname (historisch)", baujahr: "ca. 1965", image: "lf16ts.png", details: "Erstes eigenes Löschfahrzeug (vorher nur Reserveeinheit bei der BF).", serviceFrom: "ca. 1965", serviceUntil: "ca. 1970" },
            { id: 102, name: "LF 15 (Magirus-Deutz)", funk: "kein Funkrufname (historisch)", baujahr: "1950", image: "lf15.png", details: "Von einer befreundeten Ortswehr übernommen (Standort nicht mehr existent).", serviceFrom: "ca. 1970", serviceUntil: "1985" },
            { id: 103, name: "VW Golf", funk: "kein Funkrufname (Dienstfahrzeug)", baujahr: "1985", image: "vwgolf.png", details: "Dienstfahrzeug für Transport- und Führungsaufgaben.", serviceFrom: "1985", serviceUntil: "2000" },
            { id: 104, name: "VW T4 (altes MTW)", funk: "Florian Nürnberg 2/14-1 (früher)", baujahr: "2000", image: "vwt4.png", details: "Eigenausbau zum MTW. Nach Unfall 2017 außer Dienst.", serviceFrom: "2000", serviceUntil: "2017" }
        ];

        // Fachgruppen (vorbereitet – Beschreibungen können später angepasst werden)
        const specialGroups = [
            { name: "Luftunterstützung / Drohne", description: "Einsatz von Drohnen zur Lageerkundung, Wärmebild und Messflügen. Fahrzeug: GW Drohne." },
            { name: "Umwelt & Gefahrgut", description: "Zuständig für Umwelteinsätze, Öl-/Chemieunfälle, Messtechnik. Fahrzeuge: GW Drohne, FwA-Umwelt." },
            { name: "Verpflegung", description: "Einsatzverpflegung bei Großeinsätzen. Fahrzeug: FwA-Gulasch (TFK 250)." },
            { name: "Wasserrettung", description: "Unterstützung der Berufsfeuerwehr. Boot 'Helmut' (2/99-1). Zugfahrzeuge: MTW, KdoW." }
        ];

        let reports = [];
        let currentPage = "home";
        let currentDetailVehicle = null;

        // --------------------------------------------------------------
        // SPEICHER / LADEN
        // --------------------------------------------------------------
        function saveData() {
            localStorage.setItem("ff_reports", JSON.stringify(reports));
        }
        function loadData() {
            const r = localStorage.getItem("ff_reports");
            if (r) reports = JSON.parse(r);
            else reports = [];
        }
        loadData();

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, (m) => (m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;"));
        }

        function getImageSrc(imgName) {
            if (imgName && imgName !== "") return IMG_PATH + imgName;
            return PLACEHOLDER;
        }

        // --------------------------------------------------------------
        // DETAILSEITE
        // --------------------------------------------------------------
        function showVehicleDetail(vehicle, isRetired = false) {
            currentDetailVehicle = { vehicle, isRetired };
            renderDetailPage();
        }

        function renderDetailPage() {
            if (!currentDetailVehicle) {
                loadPage("vehicles");
                return;
            }
            const v = currentDetailVehicle.vehicle;
            const isRetired = currentDetailVehicle.isRetired;
            let html = `
                <div class="detail-page">
                    <button id="backToVehiclesBtn" class="back-btn">← Zurück zur Fahrzeugübersicht</button>
                    <div class="detail-header">${escapeHtml(v.name)}</div>
                    ${v.funk ? `<div class="funk-badge">📻 ${escapeHtml(v.funk)}</div>` : ""}
                    <div class="meta-row">
                        ${v.baujahr ? `<div><strong>📅 Baujahr:</strong> ${escapeHtml(v.baujahr)}</div>` : ""}
                        ${v.besatzung ? `<div><strong>👥 Besatzung:</strong> ${escapeHtml(v.besatzung)}</div>` : ""}
                        ${v.serviceFrom ? `<div><strong>📅 Im Dienst:</strong> ${escapeHtml(v.serviceFrom)} – ${escapeHtml(v.serviceUntil)}</div>` : ""}
                    </div>
                    <div class="detail-img">
                        <img src="${getImageSrc(v.image)}" alt="${escapeHtml(v.name)}" loading="lazy">
                    </div>
                    <div class="detail-description">
                        <strong>Beschreibung / Technik:</strong>
                        <p>${escapeHtml(v.details || v.text)}</p>
                    </div>
                    ${!isRetired && v.defect ? `<div class="defect-badge inline-badge">⚠️ techn. Problem / Defekt</div>` : ""}
                    ${!isRetired && v.notActive ? `<div class="defect-badge inline-badge">⏳ noch nicht im Dienst (Außendienst)</div>` : ""}
                </div>
            `;
            document.getElementById("pageContent").innerHTML = html;
            document.getElementById("backToVehiclesBtn").onclick = () => {
                currentDetailVehicle = null;
                loadPage("vehicles");
            };
        }

        // --------------------------------------------------------------
        // SEITEN RENDERING
        // --------------------------------------------------------------
        function renderHome() {
            return `
                <div class="hero" style="background-image: url('${getImageSrc("hero.png")}');">
                    <h2>Willkommen bei der Freiwilligen Feuerwehr Nürnberg Stadt</h2>
                    <p>Wir schützen Nürnberg – ehrenamtlich, modern, einsatzbereit.</p>
                </div>
                <div class="grid">
                    <div class="card" data-page="vehicles">
                        <div class="card-content"><h3 class="card-title">🚒 Fahrzeuge</h3><p>Unsere aktuelle Flotte und ausgemusterte Fahrzeuge</p><button class="nav-button">Zur Fahrzeugübersicht →</button></div>
                    </div>
                    <div class="card" data-page="specialgroups">
                        <div class="card-content"><h3 class="card-title">🛠️ Fachgruppen</h3><p>Luftunterstützung, Umwelt, Verpflegung, Wasserrettung</p><button class="nav-button">Zu den Fachgruppen →</button></div>
                    </div>
                    <div class="card" data-page="history">
                        <div class="card-content"><h3 class="card-title">📖 Geschichte</h3><p>Über 150 Jahre Feuerwehrgeschichte in Nürnberg</p><button class="nav-button">Zur Geschichte →</button></div>
                    </div>
                </div>
            `;
        }

        function renderVehicles() {
            const activeList = vehiclesActive.map(v => `
                <div class="card" data-id="${v.id}" data-type="active">
                    <div class="card-img"><img src="${getImageSrc(v.image)}" alt="${escapeHtml(v.name)}" loading="lazy"></div>
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(v.name)} ${v.defect ? '<span class="defect-badge">⚠️ defekt</span>' : v.notActive ? '<span class="defect-badge">⏳ Außendienst</span>' : ''}</div>
                        ${v.funk ? `<div class="funk-badge">📻 ${escapeHtml(v.funk)}</div>` : ""}
                        <p>${escapeHtml(v.text)}</p>
                    </div>
                </div>
            `).join("");

            const retiredList = vehiclesRetired.map(v => `
                <div class="card" data-id="${v.id}" data-type="retired">
                    <div class="card-img"><img src="${getImageSrc(v.image)}" alt="${escapeHtml(v.name)}" loading="lazy"></div>
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(v.name)} <span class="retired-badge">📅 ausgemustert</span></div>
                        ${v.funk ? `<div class="funk-badge">📻 ${escapeHtml(v.funk)}</div>` : ""}
                        <div class="service-period">Im Dienst: ${v.serviceFrom} – ${v.serviceUntil}</div>
                        <p>${escapeHtml(v.details)}</p>
                    </div>
                </div>
            `).join("");

            return `
                <h2 class="section-header">🚒 Aktive Flotte (im Dienst)</h2>
                <div class="grid active-grid">${activeList}</div>
                <h2 class="section-header">📜 Ausgemusterte Fahrzeuge (Historie)</h2>
                <div class="grid retired-grid">${retiredList}</div>
            `;
        }

        function renderSpecialGroups() {
            const groupsList = specialGroups.map(g => `
                <div class="card">
                    <div class="card-content">
                        <div class="card-title">🛠️ ${escapeHtml(g.name)}</div>
                        <p>${escapeHtml(g.description)}</p>
                    </div>
                </div>
            `).join("");
            return `<h2 class="section-header">🛠️ Fachgruppen der FF Nürnberg Stadt</h2><div class="grid">${groupsList}</div>`;
        }

        function renderHistory() {
            return `
                <h2>📖 Geschichte der Freiwilligen Feuerwehr Nürnberg</h2>
                <div class="detail-page">
                    <p>Die Wurzeln der heutigen Freiwilligen Feuerwehr Nürnberg reichen bis in die Mitte des 19. Jahrhunderts zurück. Um etwa 1850 entstand in der Stadt eine erste organisierte Bürger- und Wachstruktur im Bereich des Brandschutzes.</p>
                    <p>Im Jahr 1869 wurde diese ursprüngliche Wachstruktur wieder aufgelöst. Zwischen 1898 und 1925 existierte keine eigenständige Struktur. 1925 erfolgte die Neugründung in einer ehemaligen Halle der Berufsfeuerwehr.</p>
                    <p>Lange Zeit war die Einheit nur Reserveeinheit bei der Berufsfeuerwehr. Das erste eigene Löschfahrzeug war das LF 16 TS (LSHD), das ca. 1965 beschafft wurde. Es folgte ein LF 15 (Magirus-Deutz), das von einer befreundeten Ortswehr übernommen wurde.</p>
                    <p>Im Jahr 1985 wurde ein VW Golf als Dienstfahrzeug angeschafft, 2000 abgelöst durch einen VW T4 (Eigenausbau zum MTW). 1995 wurde ein LF 16/12 von der BF übernommen.</p>
                    <p>Nach der Wiedervereinigung wurde eine TSA übernommen, 2001 eine Feldküche, 2008 Umbau zum FwA-Umwelt. 2010 wurde das HLF 16/25 übernommen, 2012 der GW-L1.</p>
                    <p>2022 erfolgte der Umzug in die provisorische Rettungswache. 2025 kam der GW Drohne hinzu. 2026 stehen große Veränderungen an: GW-L1 und HLF werden außer Dienst gestellt, Ersatz ist geplant. Das LF 20 KatS wartet auf seine Indienststellung.</p>
                    <p>Heute ist die FF Nürnberg eine moderne, flexibel strukturierte Einheit mit Fahrzeugen aus Feuerwehr, KatS, Umwelttechnik und Wasserrettung.</p>
                </div>
            `;
        }

        function renderReports() {
            const approved = reports.filter(r => r.status === "approved").reverse();
            return `
                <h2>📋 Einsatzberichte</h2>
                <button id="showReportFormBtn" class="report-btn">+ Bericht einreichen</button>
                <div id="reportFormContainer" style="display:none; margin-bottom:2rem;">
                    <div class="card">
                        <div class="card-content">
                            <h3>Neuen Einsatzbericht einreichen</h3>
                            <div class="form-group"><label>Dein Name (Benutzername):</label><input type="text" id="reportAuthor" placeholder="z. B. Max Mustermann"></div>
                            <div class="form-group"><label>Titel:</label><input type="text" id="reportTitle"></div>
                            <div class="form-group"><label>Datum:</label><input type="date" id="reportDate"></div>
                            <div class="form-group"><label>Einsatzort:</label><input type="text" id="reportLocation"></div>
                            <div class="form-group"><label>Beteiligte Fahrzeuge:</label>
                                <div class="checkbox-group" id="vehicleCheckboxes">
                                    ${vehiclesActive.filter(v => !v.category).map(v => `<label><input type="checkbox" value="${v.id}" data-name="${escapeHtml(v.name)}"> ${escapeHtml(v.name)}</label>`).join("")}
                                </div>
                            </div>
                            <div class="form-group"><label>Andere Organisationen (Polizei, THW, etc.):</label><input type="text" id="otherOrgs"></div>
                            <div class="form-group"><label>Gruppenführer / Truppführer:</label><input type="text" id="groupLeader"></div>
                            <div class="form-group"><label>Einsatzleiter (optional):</label><input type="text" id="incidentCommander"></div>
                            <div class="form-group"><label>Einsatzbericht (Text):</label><textarea id="reportText" rows="6"></textarea></div>
                            <button id="submitReportBtn">Einreichen</button>
                        </div>
                    </div>
                </div>
                <div class="grid reports-grid">
                    ${approved.map(r => `
                        <div class="card">
                            <div class="card-content">
                                <div class="card-title">${escapeHtml(r.title)}</div>
                                <div>📅 ${r.date} | 📍 ${r.location}</div>
                                <p>${escapeHtml(r.text)}</p>
                                <div><strong>👤 Autor:</strong> ${escapeHtml(r.author)}</div>
                                <div><strong>Fahrzeuge:</strong> ${r.vehicleNames || "keine"}</div>
                                ${r.groupLeader ? `<div><strong>Gruppenführer:</strong> ${escapeHtml(r.groupLeader)}</div>` : ""}
                                ${r.incidentCommander ? `<div><strong>Einsatzleiter:</strong> ${escapeHtml(r.incidentCommander)}</div>` : ""}
                                ${r.otherOrgs ? `<div><strong>Andere Organisationen:</strong> ${escapeHtml(r.otherOrgs)}</div>` : ""}
                            </div>
                        </div>
                    `).join("")}
                </div>
            `;
        }

        function renderPartners() {
            return `
                <h2>🤝 Unsere Partner</h2>
                <div class="grid">
                    <div class="card"><div class="card-img"><img src="${getImageSrc("beft.png")}" alt="BEFT Modding"></div><div class="card-content"><h3 class="card-title">BEFT Modding Team</h3><p>Design für Einsatzfahrzeuge & Fahrzeugbereitstellung</p></div></div>
                    <div class="card"><div class="card-img"><img src="${getImageSrc("bergung-wolf.png")}" alt="Bergung Wolf"></div><div class="card-content"><h3 class="card-title">Bergung Wolf</h3><p>Unterstützung auf dem Server Nürnberg RP</p></div></div>
                </div>
            `;
        }

        function loadPage(page) {
            currentDetailVehicle = null;
            currentPage = page;
            let html = "";
            if (page === "home") html = renderHome();
            else if (page === "vehicles") html = renderVehicles();
            else if (page === "specialgroups") html = renderSpecialGroups();
            else if (page === "history") html = renderHistory();
            else if (page === "reports") html = renderReports();
            else if (page === "partners") html = renderPartners();
            document.getElementById("pageContent").innerHTML = html;

            document.querySelectorAll(".nav-link").forEach(link => link.classList.remove("active"));
            document.querySelector(`.nav-link[data-page="${page}"]`).classList.add("active");

            // Fahrzeugkarten mit Klick-Event
            document.querySelectorAll(".card[data-id]").forEach(card => {
                const id = parseInt(card.dataset.id);
                const type = card.dataset.type;
                if (type === "active") {
                    const vehicle = vehiclesActive.find(v => v.id === id);
                    if (vehicle) card.onclick = () => showVehicleDetail(vehicle, false);
                } else if (type === "retired") {
                    const vehicle = vehiclesRetired.find(v => v.id === id);
                    if (vehicle) card.onclick = () => showVehicleDetail(vehicle, true);
                }
            });
            // Startseiten-Karten
            document.querySelectorAll(".card[data-page]").forEach(card => {
                const p = card.dataset.page;
                card.onclick = () => loadPage(p);
            });
            // Bericht-Formular-Logik
            if (page === "reports") {
                const showBtn = document.getElementById("showReportFormBtn");
                const formContainer = document.getElementById("reportFormContainer");
                if (showBtn && formContainer) {
                    showBtn.onclick = () => {
                        if (formContainer.style.display === "none") {
                            formContainer.style.display = "block";
                            showBtn.textContent = "✖️ Formular schließen";
                        } else {
                            formContainer.style.display = "none";
                            showBtn.textContent = "+ Bericht einreichen";
                        }
                    };
                    document.getElementById("submitReportBtn")?.addEventListener("click", () => {
                        const author = document.getElementById("reportAuthor")?.value;
                        const title = document.getElementById("reportTitle")?.value;
                        const date = document.getElementById("reportDate")?.value;
                        const location = document.getElementById("reportLocation")?.value;
                        const otherOrgs = document.getElementById("otherOrgs")?.value;
                        const groupLeader = document.getElementById("groupLeader")?.value;
                        const incidentCommander = document.getElementById("incidentCommander")?.value;
                        const text = document.getElementById("reportText")?.value;
                        const selectedBoxes = document.querySelectorAll('#vehicleCheckboxes input:checked');
                        const vehicleNames = Array.from(selectedBoxes).map(cb => cb.getAttribute("data-name")).join(", ");
                        if (!author || !title || !date || !location || !text) {
                            alert("Bitte alle Pflichtfelder ausfüllen.");
                            return;
                        }
                        reports.push({
                            id: Date.now(),
                            author, title, date, location, otherOrgs, groupLeader, incidentCommander, text,
                            vehicleNames, status: "pending"
                        });
                        saveData();
                        alert("Bericht eingereicht! Er wird nach Prüfung freigeschaltet.");
                        formContainer.style.display = "none";
                        if (showBtn) showBtn.textContent = "+ Bericht einreichen";
                        loadPage("reports");
                    });
                }
            }
        }

        // --------------------------------------------------------------
        // ADMIN-FREIGABE (STRG+ALT+A)
        // --------------------------------------------------------------
        function showAdminPanel() {
            const pw = prompt("Admin-Passwort:");
            if (pw !== "adminFF") { alert("Falsches Passwort!"); return; }
            const pending = reports.filter(r => r.status === "pending");
            if (pending.length === 0) { alert("Keine wartenden Berichte."); return; }
            let msg = "Wartende Berichte:\n\n";
            pending.forEach((r, idx) => { msg += `${idx+1}. ${r.title} (${r.date}) von ${r.author}\n`; });
            msg += "\nNummer zum Freischalten:";
            const num = parseInt(prompt(msg));
            if (num && num > 0 && num <= pending.length) {
                pending[num-1].status = "approved";
                saveData();
                alert("Bericht freigeschaltet!");
                if (currentPage === "reports") loadPage("reports");
            }
        }

        // --------------------------------------------------------------
        // IMPRESSUM / DATENSCHUTZ MODAL
        // --------------------------------------------------------------
        function showImpressum() {
            document.getElementById("modalTitle").innerText = "Impressum";
            document.getElementById("modalBody").innerHTML = `
                <strong>Projekt:</strong> Nürnberg RP – Freiwillige Feuerwehr Nürnberg (Rollenspiel)<br>
                <strong>Vertreten durch:</strong> FireBenni<br>
                <strong>Kontakt:</strong> <a href="https://discord.gg/bQqCNfnZ4W" target="_blank">Discord-Server</a><br>
                <strong>Hinweis:</strong> Diese Webseite dient ausschließlich dem Rollenspiel im Rahmen von FiveM / GTA-RP.
            `;
            document.getElementById("modal").style.display = "flex";
        }
        function showDatenschutz() {
            document.getElementById("modalTitle").innerText = "Datenschutzerklärung";
            document.getElementById("modalBody").innerHTML = `
                Diese Webseite speichert keine personenbezogenen Daten. Keine Cookies. Lokale Speicherung (LocalStorage) für Einstellungen und Berichte.<br>
                Verantwortlich: FireBenni · Stand April 2026.
            `;
            document.getElementById("modal").style.display = "flex";
        }

        // --------------------------------------------------------------
        // EVENT LISTENER & INIT
        // --------------------------------------------------------------
        document.getElementById("burgerBtn").onclick = () => document.getElementById("navLinks").classList.toggle("show");
        document.querySelectorAll(".nav-link").forEach(link => {
            link.onclick = () => {
                loadPage(link.dataset.page);
                document.getElementById("navLinks").classList.remove("show");
            };
        });
        document.getElementById("darkmodeToggle").onclick = () => document.body.classList.toggle("dark");
        document.getElementById("impressumLink").onclick = showImpressum;
        document.getElementById("datenschutzLink").onclick = showDatenschutz;
        document.getElementById("closeModal").onclick = () => document.getElementById("modal").style.display = "none";
        document.addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.altKey && e.key === "a") {
                e.preventDefault();
                showAdminPanel();
            }
        });
        if (window.matchMedia("(prefers-color-scheme: dark)").matches) document.body.classList.add("dark");
        loadPage("home");
    </script>
</body>
</html>
